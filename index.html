<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NeverMiss AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#050816;
color:#fff;
}

.wrap{
max-width:1100px;
margin:auto;
padding:24px;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
}

.logo{
font-weight:800;
display:flex;
align-items:center;
gap:10px;
}

.dot{
width:10px;height:10px;
border-radius:50%;
background:#71e7ff;
}

.hero{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
}

h1{
font-size:48px;
margin:0;
}

p{
color:#a8b8d9;
line-height:1.6;
}

button{
padding:12px 16px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:700;
background:linear-gradient(135deg,#71e7ff,#9a80ff);
color:#000;
}

.chat{
height:350px;
overflow:auto;
padding:10px;
background:#0b122a;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
}

.inputRow{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #333;
background:#0b122a;
color:white;
}

.msg{
margin:8px 0;
}

.user{color:#cfe9ff;text-align:right;}
.ai{color:#9fb4d9;}

@media(max-width:900px){
.hero{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrap">

<!-- NAV -->
<div class="nav">
<div class="logo"><span class="dot"></span>NeverMiss AI</div>
</div>

<!-- HERO -->
<div class="hero">

<!-- LEFT -->
<div class="card">
<h1>AI Receptionist</h1>
<p>
NeverMiss AI answers customers, captures leads, and responds instantly.
</p>
<p>
Type a message below to test the AI demo.
</p>
</div>

<!-- RIGHT CHAT -->
<div class="card">

<div id="chat" class="chat">
<div class="msg ai">AI: Hi! How can I help you today?</div>
</div>

<div class="inputRow">
<input id="input" placeholder="Type message..." />
<button onclick="send()">Send</button>
</div>

</div>

</div>

</div>

<script>

const WEBHOOK_URL = "https://hook.us2.make.com/rjgq38urxjvrt6zbk9vayhfinp6bxalp";

function addMsg(text, type){
const chat = document.getElementById("chat");
chat.innerHTML += `<div class="msg ${type}">${text}</div>`;
chat.scrollTop = chat.scrollHeight;
}

async function send(){

const input = document.getElementById("input");
const text = input.value.trim();

if(!text) return;

input.value = "";

addMsg("You: " + text, "user");

try{

const res = await fetch(WEBHOOK_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const reply = await res.text();

addMsg("AI: " + reply, "ai");

}catch(err){

addMsg("AI: Connection error (check Make scenario)", "ai");

}

}

</script>

</body>
</html>
