<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NeverMiss AI | Never Miss a Customer Call</title>
<style>
:root{--bg:#06101d;--panel:#0d1c31;--text:#eef4ff;--muted:#a8bfdc;--brand:#63d7ff;--brand2:#7c6cff;--accent:#20d07b;--line:rgba(255,255,255,.10);--shadow:0 22px 70px rgba(0,0,0,.35)}
*{box-sizing:border-box}html,body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#14335a 0%,var(--bg) 44%);color:var(--text)}
a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:0 auto;padding:24px}
.nav{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:8px 0 22px;position:sticky;top:0;z-index:20;background:linear-gradient(to bottom, rgba(6,16,29,.95), rgba(6,16,29,.7), transparent);backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:10px;font-weight:800}.dot{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 0 18px rgba(99,215,255,.65)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 20px;border-radius:14px;font-weight:700;border:1px solid var(--line)}.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#06101d;border:none;box-shadow:var(--shadow)}.ghost{background:rgba(255,255,255,.04)}
.hero{display:grid;grid-template-columns:1.05fr .95fr;gap:28px;align-items:center;padding:34px 0 18px}h1{font-size:clamp(40px,6vw,74px);line-height:.95;margin:0 0 16px}.lead{font-size:clamp(17px,2vw,22px);line-height:1.6;color:var(--muted);max-width:40rem}.chips{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0}.chip{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:14px}
.card{background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}
.demo{padding:18px}.demohead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;color:var(--muted);font-size:14px}.timeline{display:grid;gap:12px}.node{display:grid;grid-template-columns:58px 1fr;gap:14px;align-items:center;padding:14px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid var(--line);transition:.25s ease}.node.active{transform:translateX(10px);border-color:rgba(99,215,255,.45);background:rgba(99,215,255,.10)}.icon{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;font-size:24px;background:linear-gradient(135deg,rgba(99,215,255,.28),rgba(124,108,255,.28));border:1px solid rgba(255,255,255,.10)}.node h3{margin:0 0 5px}.node p{margin:0;color:var(--muted);line-height:1.5;font-size:14px}
.line{height:2px;background:linear-gradient(90deg,transparent,rgba(99,215,255,.55),transparent);margin:8px 0 2px;position:relative;overflow:hidden}.line:after{content:'';position:absolute;top:-4px;left:-18px;width:12px;height:12px;border-radius:50%;background:var(--brand);box-shadow:0 0 14px var(--brand);animation:move 5s linear infinite}@keyframes move{to{left:calc(100% + 18px)}}
section{padding:28px 0}.section-head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:16px} .section-head p{margin:0;color:var(--muted);max-width:52rem}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.feature,.testimonial,.pricing,.book{padding:22px}.feature h3,.pricing h3{margin:10px 0 8px}.feature p,.pricing p{color:var(--muted);line-height:1.6}
.split{display:grid;grid-template-columns:1fr 1fr;gap:18px}.quote{font-size:17px;line-height:1.7}.name{margin-top:14px;color:var(--muted)}
.price{display:flex;flex-direction:column;gap:10px}.tag{display:inline-flex;align-self:flex-start;padding:7px 10px;border-radius:999px;background:rgba(32,208,123,.12);border:1px solid rgba(32,208,123,.35);color:#aef4d0;font-size:13px}
form{display:grid;gap:12px}.field{display:grid;gap:6px}label{font-size:14px;color:#dbe8ff}input,textarea,select{width:100%;padding:14px 15px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);outline:none}textarea{min-height:120px;resize:vertical}
.faq details{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:16px;padding:14px 16px}.faq summary{cursor:pointer;font-weight:700}.faq p{color:var(--muted);line-height:1.6}
.footer{padding:28px 0 46px;color:var(--muted);font-size:14px;text-align:center}
.widget{min-height:260px;display:grid;place-items:center;border:1px dashed rgba(255,255,255,.18);border-radius:20px;background:rgba(255,255,255,.03);color:var(--muted);text-align:center;padding:24px}
.small{font-size:13px;color:var(--muted)}
@media(max-width:980px){.hero,.split,.grid{grid-template-columns:1fr}.nav{position:static}}
</style>
</head>
<body>
<div class="wrap">
  <header class="nav">
    <div class="logo"><span class="dot"></span>NeverMiss AI</div>
    <a class="btn ghost" href="#book">Book Demo</a>
  </header>

  <main class="hero">
    <div>
      <h1>Never miss another customer call.</h1>
      <p class="lead">NeverMiss AI helps service businesses answer faster, capture leads, and book more jobs.</p>
      <div class="chips">
        <span class="chip">24/7 answering</span>
        <span class="chip">Lead capture</span>
        <span class="chip">Appointment booking</span>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:22px">
        <a class="btn primary" href="#flow">See call flow</a>
        <a class="btn ghost" href="#book">Request demo</a>
      </div>
