<script>
const MAKE_WEBHOOK_URL = "PASTE_YOUR_MAKE_WEBHOOK_URL_HERE";

async function runDemo() {
  const demoText = document.getElementById("demoText");

  demoText.innerText = "AI: Thinking...";

  try {
    const res = await fetch(MAKE_WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "A customer is calling for urgent service booking"
      })
    });

    const data = await res.text();

    demoText.innerText = "AI: " + data;

  } catch (err) {
    demoText.innerText = "AI: Connection error. Check webhook.";
    console.error(err);
  }
}
</script>
